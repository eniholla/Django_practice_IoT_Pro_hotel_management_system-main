databases:
  - name: rosegoldhotels-db
    plan: free
    databaseName: rosegoldhotels
    ipAllowList: []

services:
  - type: web
    name: rosegoldhotels
    runtime: python
    plan: free
    rootDir: RosegoldHotels
    buildCommand: "bash build.sh"
    startCommand: "gunicorn HotelManagementSystem.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rosegoldhotels-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: NODE_VERSION
        value: 20.11.0
      - key: WEB_CONCURRENCY
        value: 4
