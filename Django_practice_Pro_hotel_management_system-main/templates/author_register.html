{% extends 'allinclude.html' %}

{% block title %}
Register - RoseGold Hotel
{% endblock %}

{% block content %}
<section id="register_section">
  <div class="register_bg">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-lg-8">
          <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <!-- Header -->
            <div class="card-header text-center py-4 text-white" style="background: linear-gradient(135deg, var(--primary), #2a2a4a);">
              <h3 class="mb-1 fw-bold">Register</h3>
              <p class="mb-0 small">Create your RoseGold Hotel account</p>
            </div>

            <!-- Registration Form -->
            <div class="card-body p-5">
              {% if messages %}
                {% for message in messages %}
                  <div class="alert alert-{{ message.tags }} alert-dismissible fade show mb-4" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}

              <form method="post" novalidate>
                {% csrf_token %}
                <div class="row g-3">
                  <div class="col-md-6">
                    <input type="text" name="first_name" class="form-control" placeholder="First Name *" required>
                  </div>
                  <div class="col-md-6">
                    <input type="text" name="last_name" class="form-control" placeholder="Last Name *" required>
                  </div>
                  <div class="col-md-6">
                    <input type="email" name="email" class="form-control" placeholder="Email *" required>
                  </div>
                  <div class="col-md-6">
                    <input type="text" name="phone" class="form-control" placeholder="Phone Number *" required>
                  </div>
                  <div class="col-md-6">
                    <input type="password" name="password1" class="form-control" placeholder="Password *" required>
                  </div>
                  <div class="col-md-6">
                    <input type="password" name="password2" class="form-control" placeholder="Confirm Password *" required>
                  </div>
                  <div class="col-12">
                    <div class="form-check mb-3">
                      <input type="checkbox" class="form-check-input" name="check" id="terms" required>
                      <label class="form-check-label" for="terms">I agree to the Terms & Conditions</label>
                    </div>
                  </div>
                  <div class="col-md-6">
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Register Now</button>
                  </div>
                  <div class="col-md-6 text-end">
                    <a href="{% url 'author_login' %}" class="btn btn-outline-primary w-100">Login Now</a>
                  </div>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<style>
.register_bg { padding: 100px 0; }
</style>
{% endblock %}
