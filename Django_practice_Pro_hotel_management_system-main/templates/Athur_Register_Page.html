{% extends 'allinclude.html' %} {% block title %} Register - RoseGold Hotel {%
endblock %} {% block content %}
<!-- Your registration form HTML goes here -->
{% endblock %}

<section id="slide">
  <div class="login_bg1">
    <div class="container">
      <div class="row">
        <div class="home-link text-center">
          <p>
            <a href="{% url 'home' %}">Home</a>
            <i class="fas fa-angle-right"></i>
            Register
          </p>
        </div>
        <div class="login_info">
          <div class="col-lg-10">
            <div class="login_txt1">
              <h2>Lucia <span> Hotel & Resort </span></h2>
              <h4>Register Here</h4>
            </div>
          </div>
          <form method="post" action="">
            {% csrf_token %}
            <div class="from_info">
              <div class="col-lg-10">
                <div class="form-group">
                  <input
                    type="text"
                    name="first_name"
                    class="form-control"
                    placeholder="First Name *"
                    required
                  />
                </div>
                <div class="form-group">
                  <input
                    type="text"
                    name="last_name"
                    class="form-control"
                    placeholder="Last Name *"
                    required
                  />
                </div>
                <div class="form-group">
                  <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Email *"
                    required
                  />
                </div>
                <div class="form-group">
                  <input
                    type="text"
                    class="form-control"
                    name="Phone_number"
                    placeholder="Phone Number *"
                    required
                  />
                </div>
                <div class="form-group">
                  <input
                    type="password"
                    name="Password1"
                    class="form-control"
                    placeholder="Password *"
                    required
                  />
                </div>
                <div class="form-group">
                  <input
                    type="password"
                    name="password2"
                    class="form-control"
                    placeholder="Confirm Password *"
                    required
                  />
                </div>
              </div>
              <div class="col-lg-10">
                <div class="checkbox2">
                  <input type="checkbox" name="check" required />
                  <label for="">I Agree To Terms & Conditions</label>
                </div>
              </div>
              <div class="col-lg-10">
                <div class="row">
                  <div class="Register_btn">
                    <button type="submit">Register Now</button>
                  </div>
                  <div class="login_btn1">
                    <a href="{% url 'author_login' %}">Login Now</a>
                  </div>
                </div>
              </div>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>

{% endblock %}
